    prerequisites:
      extensions: []
      capabilities: []
    payload_contract:
      type: object
      required:
        - postgres_version
        - server_version_num
        - is_replica
        - settings
      properties:
        postgres_version:
          type: string
          description: PostgreSQL version string
        server_version_num:
          type: integer
          description: Numeric server version
        is_replica:
          type: boolean
        settings:
          type: object
          required:
            - max_connections
            - shared_buffers
            - work_mem
            - maintenance_work_mem
            - effective_cache_size
            - max_wal_size
            - checkpoint_timeout
            - autovacuum
