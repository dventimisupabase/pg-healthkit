metadata:
  normalization_guidance:
    - Normalize intervals and durations to numeric milliseconds or seconds, not textual intervals.
    - Normalize sizes to integer byte counts wherever practical.
    - Preserve row arrays for operator review, but expose stable summary fields for rules.
    - Prefer null over empty string for unknown values.
    - Keep query text truncated consistently if truncation is required.
    - If a probe is unavailable, mark it skipped rather than synthesizing an empty payload.
  implementation_notes:
    - The SQL runner and normalizer should emit payloads matching these field names exactly.
    - Summary fields are the canonical fields expected by the rule engine.
    - Additional fields may be included, but existing field names should remain stable once adopted.
