metadata:
  guidance:
    path_resolution: >
      Each condition reads a scalar from the named probe payload using dot-path lookup.
      Example: `summary.oldest_xact_age_seconds` resolves against the normalized payload for
      the `long_running_transactions` probe.
    evaluation_notes:
      - first_match means the first matching case wins and later cases are ignored.
      - all conditions inside `all` must evaluate true.
      - missing required probes should cause the rule to be skipped, not failed.
      - missing facts inside an available probe should cause the case to evaluate false.
      - score_effects are additive deltas applied to the domain score.
      - templates use ${...} interpolation from the matched rule context.
