  - id: pool_mode_misconfiguration
    enabled: true
    profiles: [default, performance]
    finding:
      key: pool_mode_misconfiguration
      domain: performance
      title: Connection pool mode misconfiguration
      summary_template: >
        Connection pool is in ${summary.pool_mode} mode.
      impact_template: >
        Transaction mode breaks prepared statement caching, increasing planning overhead.
      recommendation_template: >
        Use session mode for workloads requiring prepared statements, or transaction mode for high
        concurrency.
      tags: [supabase, pgbouncer, pooling]
    evidence:
      required_probes:
        - pgbouncer_pool_health
    evaluate:
      mode: first_match
      cases:
        - when:
